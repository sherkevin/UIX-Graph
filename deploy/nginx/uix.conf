# ============================================================
# UIX（SXEE-LITHO-RCA）Nginx 同源反代配置
# 部署场景：前端静态资源 + 后端 API 统一在同一域名下访问
# ============================================================
#
# 使用方式（Linux/macOS）：
#   1. 构建前端：cd src/frontend && npm run build
#   2. 将 dist/ 目录内容复制到 /var/www/uix/（或修改 root 路径）
#   3. 后端运行在 127.0.0.1:8000（本机内部，不对外暴露）
#   4. 将本文件复制到 /etc/nginx/conf.d/uix.conf 并 nginx -s reload
#
# Windows（Nginx for Windows）：将本文件复制到 nginx/conf/conf.d/uix.conf

server {
    listen 80;
    # 替换为实际域名或外网 IP
    server_name your-external-domain.com _;

    # 前端静态资源目录（npm run build 产物）
    root /var/www/uix;
    index index.html;

    # ── 后端 API 反代 ──────────────────────────────────────────────────────
    # 所有 /api/* 请求转发到 FastAPI（:8000）
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # 跨域头（同源反代时通常不需要，但保留作为防御性配置）
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── FastAPI Swagger 文档（可选，内网调试用，外网可删除此块） ─────────────
    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── 健康检查转发 ──────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }

    # ── 前端 SPA 路由（React Router）────────────────────────────────────────
    # 非 /api/ 的请求全部回退到 index.html，由前端路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 静态资源缓存 ────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
